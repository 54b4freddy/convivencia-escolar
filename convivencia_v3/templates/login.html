<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convivencia Escolar · Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='tailwind.css') }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0f0e17;
      --paper: #fffcf5;
      --gold: #c9a84c;
      --gold-light: #e8d5a3;
      --rust: #c0392b;
      --muted: #7a7070;
      --surface: rgba(255,252,245,0.92);
    }

    html, body {
      height: 100%;
      background: var(--ink);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }
    /* ── decorative grid lines ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,.06) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* ── animated corner ornament ── */
    .corner {
      position: fixed;
      width: 240px; height: 240px;
      border: 1px solid rgba(201,168,76,.2);
      pointer-events: none;
    }
    .corner-tl { top: 24px; left: 24px; border-right: none; border-bottom: none; }
    .corner-br { bottom: 24px; right: 24px; border-left: none; border-top: none; }

    /* ── layout: .scene usa utilidades Tailwind en el HTML ── */
    .card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(201,168,76,.3);
      border-radius: 4px;
      width: min(440px, 92vw);
      padding: 52px 48px 44px;
      box-shadow: 0 40px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(201,168,76,.1);
      animation: rise .6s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .escudo {
      width: 72px; height: 72px;
      margin: 0 auto 24px;
      display: block;
      border-radius: 50%;
      border: 2px solid var(--gold);
      padding: 4px;
      object-fit: cover;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--ink);
      text-align: center;
      letter-spacing: -.01em;
      line-height: 1.1;
    }
    .card-sub {
      color: var(--muted);
      font-size: .8rem;
      text-align: center;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-top: 6px;
      margin-bottom: 36px;
    }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 36px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: var(--gold-light);
    }
    .divider span { color: var(--gold); font-size: .7rem; letter-spacing: .15em; }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      background: #fff;
      color: var(--ink);
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .field input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,.12);
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--ink);
      color: var(--gold);
      border: 1px solid var(--gold);
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: background .2s, color .2s;
    }
    .btn-primary:hover { background: var(--gold); color: var(--ink); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    .error-msg {
      color: var(--rust);
      font-size: .82rem;
      text-align: center;
      margin-top: 12px;
      min-height: 20px;
    }

  </style>
</head>
<body class="antialiased selection:bg-[rgba(201,168,76,0.35)]">
  <div class="corner corner-tl"></div>
  <div class="corner corner-br"></div>

  <div class="scene relative flex min-h-screen items-center justify-center">
    <div class="card shadow-[0_40px_80px_rgba(0,0,0,0.5)] ring-1 ring-[rgba(201,168,76,0.12)]">
      <img class="escudo"
        src="https://drive.google.com/thumbnail?sz=w200&id=1BG_kKYH5zFtnxCNFI1ViFfv4Y5JqcTMR"
        onerror="this.src='https://placehold.co/72x72/c9a84c/0f0e17?text=CE'"
        alt="Escudo">
      <h1 class="card-title">Convivencia Escolar</h1>
      <p class="card-sub">Sistema de Gestión Disciplinar</p>

      <div class="divider"><span>acceso</span></div>

      <div class="field">
        <label id="lblUsuario">Usuario</label>
        <input type="text" id="usuario" placeholder="Ingrese su usuario" autocomplete="username">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="contrasena" placeholder="••••••••" autocomplete="current-password">
      </div>
      <label style="display:flex;align-items:center;gap:10px;margin-top:4px;font-size:0.85rem;color:var(--muted);cursor:pointer">
        <input type="checkbox" id="chkEst" onchange="toggleEstColegio()"> Soy estudiante: mi usuario es mi documento
      </label>
      <div class="field" id="estColWrap" style="display:none;margin-top:10px">
        <label>Nombre de mi colegio (I.E.)</label>
        <input type="text" id="estColegioNombre" autocomplete="organization" placeholder="Ej. Institución educativa Pablo VI Puerto Triunfo" style="width:100%;padding:10px 12px;border-radius:4px;border:1px solid rgba(201,168,76,.35);background:rgba(255,252,245,.9)">
        <span style="font-size:0.72rem;color:var(--muted);display:block;margin-top:6px">Como aparece en el carnet o en la página del colegio. Solo si el sistema se lo pide.</span>
      </div>

      <button class="btn-primary" id="btnLogin" onclick="iniciarSesion()">Ingresar</button>
      <p class="error-msg" id="mensajeError"></p>
    </div>
  </div>

  <script>
    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') iniciarSesion();
    });

    function toggleEstColegio() {
      const on = document.getElementById('chkEst').checked;
      document.getElementById('estColWrap').style.display = 'none';
      const nm = document.getElementById('estColegioNombre');
      if (nm) nm.value = '';
      document.getElementById('lblUsuario').textContent = on ? 'Documento (sin puntos)' : 'Usuario';
      document.getElementById('usuario').placeholder = on ? 'Ej. 1001234567' : 'Ingrese su usuario';
      const pc = document.getElementById('contrasena');
      if (pc) pc.placeholder = on ? 'Por defecto: 4 últimos dígitos del documento' : '••••••••';
    }

    async function iniciarSesion() {
      const btn = document.getElementById('btnLogin');
      const err = document.getElementById('mensajeError');
      btn.disabled = true;
      btn.textContent = 'Verificando…';
      err.textContent = '';

      const usuario = document.getElementById('usuario').value.trim();
      const contrasena = document.getElementById('contrasena').value;
      const payload = { usuario, contrasena };
      if (document.getElementById('chkEst').checked) {
        const nom = (document.getElementById('estColegioNombre') && document.getElementById('estColegioNombre').value || '').trim();
        if (nom) payload.colegio_nombre = nom;
      }

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();

        if (data.ok) {
          if (data.usuario && data.usuario.rol === 'Estudiante')
            window.location.href = '/estudiante/reportar';
          else
            window.location.href = '/dashboard';
        } else {
          err.textContent = data.error || 'Credenciales incorrectas';
          if ((data.need_institucion || data.need_colegio_id) && document.getElementById('chkEst').checked) {
            document.getElementById('estColWrap').style.display = 'block';
            const nm = document.getElementById('estColegioNombre');
            if (nm) nm.focus();
          }
          btn.disabled = false;
          btn.textContent = 'Ingresar';
        }
      } catch {
        err.textContent = 'Error de conexión. Intente de nuevo.';
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    }

  </script>
</body>
</html>
