<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convivencia Escolar · Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='tailwind.css') }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #143351;
      --emerald: #009368;
      --sand: #eed474;
      --ink: #0f0e17;
      --muted: #6b7280;
      --rust: #c0392b;
      --surface: rgba(246, 244, 239, 0.96);
    }

    html, body {
      height: 100%;
      background: var(--navy);
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(238, 212, 116, .05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(238, 212, 116, .05) 1px, transparent 1px);
      background-size: 56px 56px;
      pointer-events: none;
    }

    .corner {
      position: fixed;
      width: 220px; height: 220px;
      border: 1px solid rgba(238, 212, 116, .18);
      pointer-events: none;
    }
    .corner-tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
    .corner-br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

    .card {
      background: var(--surface);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(238, 212, 116, .25);
      border-radius: 12px;
      width: min(440px, 92vw);
      padding: 48px 44px 40px;
      box-shadow: 0 32px 64px rgba(0, 0, 0, .45), 0 0 0 1px rgba(0, 147, 104, .08);
      animation: rise .55s cubic-bezier(.16, 1, .3, 1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(28px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .escudo {
      width: 72px; height: 72px;
      margin: 0 auto 22px;
      display: block;
      border-radius: 50%;
      border: 2px solid var(--emerald);
      padding: 4px;
      object-fit: cover;
    }

    .card-title {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--navy);
      text-align: center;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }
    .card-sub {
      color: var(--muted);
      font-size: .78rem;
      text-align: center;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-top: 8px;
      margin-bottom: 32px;
    }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 32px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(20, 51, 81, .12);
    }
    .divider span { color: var(--emerald); font-size: .68rem; letter-spacing: .14em; font-weight: 600; }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #e0dcd4;
      border-radius: 8px;
      font-family: inherit;
      font-size: .95rem;
      background: #fff;
      color: var(--ink);
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .field input:focus {
      border-color: var(--emerald);
      box-shadow: 0 0 0 3px rgba(0, 147, 104, .14);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--emerald);
      color: #fff;
      border: 1px solid var(--emerald);
      border-radius: 10px;
      font-family: inherit;
      font-size: .88rem;
      font-weight: 600;
      letter-spacing: .04em;
      cursor: pointer;
      margin-top: 8px;
      transition: filter .2s, box-shadow .2s;
      box-shadow: 0 2px 10px rgba(0, 147, 104, .28);
    }
    .btn-primary:hover { filter: brightness(1.06); box-shadow: 0 4px 16px rgba(0, 147, 104, .35); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; filter: none; }

    .error-msg {
      color: var(--rust);
      font-size: .82rem;
      text-align: center;
      margin-top: 12px;
      min-height: 20px;
    }

  </style>
</head>
<body class="antialiased selection:bg-[rgba(0,147,104,0.22)]">
  <div class="corner corner-tl"></div>
  <div class="corner corner-br"></div>

  <div class="scene relative flex min-h-screen items-center justify-center">
    <div class="card shadow-[0_40px_80px_rgba(0,0,0,0.45)] ring-1 ring-[rgba(0,147,104,0.1)]">
      <img class="escudo"
        src="https://drive.google.com/thumbnail?sz=w200&id=1BG_kKYH5zFtnxCNFI1ViFfv4Y5JqcTMR"
        onerror="this.src='https://placehold.co/72x72/009368/ffffff?text=CE'"
        alt="Escudo">
      <h1 class="card-title">Convivencia Escolar</h1>
      <p class="card-sub">Sistema de Gestión Disciplinar</p>

      <div class="divider"><span>acceso</span></div>

      <div class="field">
        <label id="lblUsuario">Usuario</label>
        <input type="text" id="usuario" placeholder="Ingrese su usuario" autocomplete="username">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="contrasena" placeholder="••••••••" autocomplete="current-password">
      </div>
      <label style="display:flex;align-items:center;gap:10px;margin-top:4px;font-size:0.85rem;color:var(--muted);cursor:pointer">
        <input type="checkbox" id="chkEst" onchange="toggleEstColegio()"> Soy estudiante: mi usuario es mi documento
      </label>
      <div class="field" id="estColWrap" style="display:none;margin-top:10px">
        <label>Nombre de mi colegio (I.E.)</label>
        <input type="text" id="estColegioNombre" autocomplete="organization" placeholder="Ej. Institución educativa Pablo VI Puerto Triunfo" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid rgba(0,147,104,.25);background:rgba(255,255,255,.95)">
        <span style="font-size:0.72rem;color:var(--muted);display:block;margin-top:6px">Como aparece en el carnet o en la página del colegio. Solo si el sistema se lo pide.</span>
      </div>

      <button class="btn-primary" id="btnLogin" onclick="iniciarSesion()">Ingresar</button>
      <p class="error-msg" id="mensajeError"></p>
    </div>
  </div>

  <script>
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') iniciarSesion();
    });

    function toggleEstColegio() {
      const on = document.getElementById('chkEst').checked;
      document.getElementById('estColWrap').style.display = 'none';
      const nm = document.getElementById('estColegioNombre');
      if (nm) nm.value = '';
      document.getElementById('lblUsuario').textContent = on ? 'Documento (sin puntos)' : 'Usuario';
      document.getElementById('usuario').placeholder = on ? 'Ej. 1001234567' : 'Ingrese su usuario';
      const pc = document.getElementById('contrasena');
      if (pc) pc.placeholder = on ? 'Por defecto: 4 últimos dígitos del documento' : '••••••••';
    }

    async function iniciarSesion() {
      const btn = document.getElementById('btnLogin');
      const err = document.getElementById('mensajeError');
      btn.disabled = true;
      btn.textContent = 'Verificando…';
      err.textContent = '';

      const usuario = document.getElementById('usuario').value.trim();
      const contrasena = document.getElementById('contrasena').value;
      const payload = { usuario, contrasena };
      if (document.getElementById('chkEst').checked) {
        const nom = (document.getElementById('estColegioNombre') && document.getElementById('estColegioNombre').value || '').trim();
        if (nom) payload.colegio_nombre = nom;
      }

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();

        if (data.ok) {
          if (data.usuario && data.usuario.rol === 'Estudiante')
            window.location.href = '/estudiante/reportar';
          else
            window.location.href = '/dashboard';
        } else {
          err.textContent = data.error || 'Credenciales incorrectas';
          if ((data.need_institucion || data.need_colegio_id) && document.getElementById('chkEst').checked) {
            document.getElementById('estColWrap').style.display = 'block';
            const nm = document.getElementById('estColegioNombre');
            if (nm) nm.focus();
          }
          btn.disabled = false;
          btn.textContent = 'Ingresar';
        }
      } catch {
        err.textContent = 'Error de conexión. Intente de nuevo.';
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    }

  </script>
</body>
</html>
